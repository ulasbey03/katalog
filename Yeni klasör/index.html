<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Vitrini</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- İkonlar -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e293b;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* --- HERO --- */
        header {
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2);
        }

        header h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 600; }
        header p { font-size: 1.1rem; opacity: 0.9; max-width: 600px; margin: 0 auto; }

        /* --- KONTROLLER --- */
        .controls {
            max-width: 1200px;
            margin: 0 auto 30px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .search-box { position: relative; width: 100%; max-width: 500px; }
        .search-box input {
            width: 100%; padding: 15px 20px 15px 50px;
            border-radius: 30px; border: 2px solid #e2e8f0;
            outline: none; transition: 0.3s; font-size: 1rem;
        }
        .search-box input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .search-box i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

        .filter-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 10px 20px; border: none; background: white;
            color: var(--secondary-color); border-radius: 20px;
            cursor: pointer; font-weight: 500; transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn:hover, .btn.active {
            background: var(--primary-color); color: white;
            transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        /* --- GRID GALERİ --- */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .product-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: all 0.4s ease;
            position: relative; cursor: pointer; border: 1px solid rgba(0,0,0,0.02);
            animation: fadeIn 0.5s ease-in-out;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.1); }

        .img-wrapper { 
            height: 250px; 
            overflow: hidden; 
            position: relative; 
            background: #eee; /* Resim yoksa gri görünsün */
        }
        
        .product-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .product-card:hover img { transform: scale(1.1); }

        .card-info { padding: 20px; }
        .category-tag { font-size: 0.75rem; text-transform: uppercase; color: var(--primary-color); font-weight: 700; display: block; margin-bottom: 5px; }
        .card-info h3 { font-size: 1.2rem; color: var(--secondary-color); margin-bottom: 10px; }
        .price { font-size: 1.1rem; color: var(--secondary-color); font-weight: 600; }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0;
            width: 100%; height: 100%; overflow: auto;
            background-color: rgba(15, 23, 42, 0.9); backdrop-filter: blur(5px);
            align-items: center; justify-content: center; padding: 20px;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.show { opacity: 1; }

        .modal-content {
            background-color: white; border-radius: 20px; width: 100%; max-width: 900px;
            display: flex; flex-direction: column; overflow: hidden; position: relative;
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .modal.show .modal-content { transform: scale(1); }

        .close-btn {
            position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.9);
            color: #333; width: 40px; height: 40px; border-radius: 50%;
            text-align: center; line-height: 40px; cursor: pointer; z-index: 50;
            font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .close-btn:hover { background: var(--primary-color); color: white; }

        .modal-body { display: flex; flex-direction: column; }

        .modal-img-box {
            width: 100%; height: 350px; background: #f1f5f9; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        
        .modal-img-box img {
            max-width: 100%; max-height: 100%; object-fit: contain;
            animation: fadeImg 0.4s;
        }

        .slider-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.8); color: #333; border: none;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; z-index: 10;
        }
        .slider-arrow:hover { background: var(--primary-color); color: white; }
        .prev { left: 15px; }
        .next { right: 15px; }

        .slide-counter {
            position: absolute; bottom: 15px; right: 15px;
            background: rgba(0,0,0,0.6); color: white;
            padding: 5px 12px; border-radius: 15px; font-size: 0.8rem;
        }

        .modal-text {
            padding: 30px; display: flex; flex-direction: column; justify-content: center;
        }
        .modal-text h2 { font-size: 1.8rem; margin-bottom: 10px; color: var(--secondary-color); }
        .modal-price { font-size: 1.5rem; color: var(--primary-color); font-weight: 700; margin-bottom: 20px; }
        .modal-desc { line-height: 1.7; color: #64748b; margin-bottom: 30px; }

        .whatsapp-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            background-color: #25D366; color: white; padding: 15px 30px;
            border-radius: 50px; text-decoration: none; font-weight: 600;
            font-size: 1.1rem; transition: 0.3s; border: none; cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }
        .whatsapp-btn:hover { background-color: #128C7E; transform: translateY(-2px); }

        @media (min-width: 768px) {
            .controls { flex-direction: row; justify-content: space-between; }
            .modal-body { flex-direction: row; height: 500px; }
            .modal-img-box { width: 55%; height: 100%; }
            .modal-text { width: 45%; overflow-y: auto; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeImg { from { opacity: 0.5; } to { opacity: 1; } }

        footer { text-align: center; padding: 40px; margin-top: 50px; color: #64748b; font-size: 0.9rem; }

    </style>
</head>
<body>

    <header>
        <h1>ÜRÜN KOLEKSİYONU</h1>
        <p>En seçkin ürünlerimizi inceleyin.</p>
    </header>

    <div class="controls">
        <div class="filter-buttons">
            <button class="btn active" onclick="filterSelection('all')">Hepsi</button>
            <button class="btn" onclick="filterSelection('ÇİKOLATA')">ÇİKOLATA</button>
            <button class="btn" onclick="filterSelection('KURABİYE')">KURABİYE</button>
            <button class="btn" onclick="filterSelection('ATIŞTIRMALIK')">ATIŞTIRMALIK</button>
        </div>
        
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Ürün ara..." onkeyup="searchProduct()">
        </div>
    </div>

    <!-- ÜRÜN VİTRİNİ -->
    <div class="gallery-container">
        
        <!-- ÜRÜN 1 -->
        <!-- NOT: 'resimler' klasöründeki dosyalarının adını buraya yazıyorsun -->
        <!-- Slider için birden çok resim varsa virgülle ayır: 'resimler/canta1.jpg,resimler/canta2.jpg' -->
        <div class="product-card" data-category="KURABİYE" 
             onclick="openModal(this)"
             data-title="Cookie Lokmaları"
             data-price="örnekfiyatt TL"
             data-desc="Bol çikolata parçalı mini cookie’ler.
Çıtır dokusu ve lezzetiyle keyifli bir atıştırmalık.
Bir tane yetmez, avuç." 
             data-images="resimler/canta.jpg,resimler/canta-ic.jpg">
            
            <div class="img-wrapper">
                <!-- Vitrin Resmi: Klasördeki adı 'canta.jpg' olmalı -->
                <img src="resimler/canta.jpg" alt="Çanta" onerror="this.src='https://via.placeholder.com/400x300?text=Resim+Yok'">
            </div>
            <div class="card-info">
                <span class="category-tag">KURABİYE</span>
                <h3>Cookie Lokmaları</h3>
                <div class="price">ÖRNEK FİYATxxx TL</div>
            </div>
        </div>

        <!-- ÜRÜN 2 -->
        <div class="product-card" data-category="KURABİYE" 
             onclick="openModal(this)"
             data-title="Usta Cookie"
             data-price="XX.XXX TL"
             data-desc="Usta Cookie
Bol çikolata parçalarıyla hazırlanan,
dışı hafif kıtır içi yumuşak özel cookie.
Her lokmada yoğun çikolata keyfi."
             data-images="resimler/usta.jpg,resimler/canta.jpg">
            
            <div class="img-wrapper">   
                <img src="resimler/usta.jpg" alt="KURABİYE" onerror="this.src='https://via.placeholder.com/400x300?text=Resim+Yok'">
            </div>
            <div class="card-info">
                <span class="category-tag">KURABİYE</span>
                <h3>Usta Cookie</h3>
                <div class="price">ÖRNEK FİYATxxx TL</div>
            </div>
        </div>

        <!-- ÜRÜN 3 (Tek Resimli) -->
        <div class="product-card" data-category="ATIŞTIRMALIK" 
             onclick="openModal(this)"
             data-title="ATIŞTIRMALIK"
             data-price="örnekfiyatt TL"
             data-desc="Özel günlerinizi unutulmaz kılmak için özenle hazırlanan nişan çikolataları.
Her biri el yapımı, şık tasarım ve zarif sunumla hazırlanır.
Söz ve nişan törenleriniz için renk ve tasarım seçenekleriyle tamamen size özel hazırlanır."
              data-images="resimler/tepsi1.jpg,resimler/tepsi2.jpg">
            
            <div class="img-wrapper">
                <img src="'resimler/tepsi2.jpg" alt="ATIŞTIRMALIK" onerror="this.src='https://via.placeholder.com/400x300?text=Resim+Yok'">
            </div>
            <div class="card-info">
                <span class="category-tag">ATIŞTIRMALIK</span>
                <h3>ATIŞTIRMALIK</h3>
                <div class="price">ÖRNEK FİYATxxx TL</div>
            </div>
        </div>

    </div>

    <footer>
        <p>&copy; ULAŞ DEMİRAĞ örnek ürün tanıtım sayfası</p>
    </footer>

    <!-- MODAL -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></div>
            
            <div class="modal-body">
                <div class="modal-img-box">
                    <button class="slider-arrow prev" onclick="changeSlide(-1)"><i class="fas fa-chevron-left"></i></button>
                    
                    <img id="modalImg" src="" alt="Detay">
                    
                    <button class="slider-arrow next" onclick="changeSlide(1)"><i class="fas fa-chevron-right"></i></button>
                    <div class="slide-counter" id="slideCounter">1 / 1</div>
                </div>

                <div class="modal-text">
                    <h2 id="modalTitle">Başlık</h2>
                    <div id="modalPrice" class="modal-price">Fiyat</div>
                    <p id="modalDesc" class="modal-desc">Açıklama</p>
                    
                    <!-- Numaranı aşağıya yaz -->
                    <a id="whatsappLink" href="#" target="_blank" class="whatsapp-btn">
                        <i class="fab fa-whatsapp"></i> WhatsApp'tan Sipariş Ver
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById("productModal");
        const modalImg = document.getElementById("modalImg");
        const modalTitle = document.getElementById("modalTitle");
        const modalDesc = document.getElementById("modalDesc");
        const modalPrice = document.getElementById("modalPrice");
        const whatsappLink = document.getElementById("whatsappLink");
        const slideCounter = document.getElementById("slideCounter");
        const prevBtn = document.querySelector(".prev");
        const nextBtn = document.querySelector(".next");

        // TELEFON NUMARANI BURAYA YAZ (Örn: 905xxxxxxxxx)
        const myPhoneNumber = "905555555555"; 

        let currentImages = [];
        let currentIndex = 0;

        function openModal(element) {
            const title = element.getAttribute("data-title");
            const desc = element.getAttribute("data-desc");
            const price = element.getAttribute("data-price");
            
            // data-images="resimler/1.jpg,resimler/2.jpg" şeklindeki veriyi parçala
            const rawImages = element.getAttribute("data-images");
            currentImages = rawImages.split(','); 
            currentIndex = 0;

            modalTitle.innerText = title;
            modalDesc.innerText = desc;
            modalPrice.innerText = price;

            updateSliderDisplay();

            const message = `Merhaba, ${title} (${price}) hakkında bilgi almak istiyorum.`;
            whatsappLink.href = `https://wa.me/${myPhoneNumber}?text=${encodeURIComponent(message)}`;

            modal.style.display = "flex";
            setTimeout(() => { modal.classList.add("show"); }, 10);
        }

        function updateSliderDisplay() {
            modalImg.src = currentImages[currentIndex];
            // Eğer resim bulunamazsa Placeholder göster (Hata önleyici)
            modalImg.onerror = function() {
                this.src = 'https://via.placeholder.com/600x400?text=Resim+Bulunamadi';
            };

            slideCounter.innerText = `${currentIndex + 1} / ${currentImages.length}`;

            if (currentImages.length <= 1) {
                prevBtn.style.display = "none";
                nextBtn.style.display = "none";
                slideCounter.style.display = "none";
            } else {
                prevBtn.style.display = "flex";
                nextBtn.style.display = "flex";
                slideCounter.style.display = "block";
            }
        }

        function changeSlide(direction) {
            currentIndex += direction;
            if (currentIndex < 0) {
                currentIndex = currentImages.length - 1;
            } else if (currentIndex >= currentImages.length) {
                currentIndex = 0;
            }
            updateSliderDisplay();
        }

        function closeModal() {
            modal.classList.remove("show");
            setTimeout(() => { modal.style.display = "none"; }, 300);
        }
        
        window.onclick = function(event) { if (event.target == modal) closeModal(); }

        function filterSelection(category) {
            const cards = document.getElementsByClassName("product-card");
            const btns = document.getElementsByClassName("btn");
            for (let btn of btns) {
                btn.classList.remove("active");
                if(btn.innerText.toLowerCase() === category || (category === 'all' && btn.innerText === 'Hepsi')) {
                   if(event.target === btn) btn.classList.add("active");
                }
            }
            for (let i = 0; i < cards.length; i++) {
                let cardCategory = cards[i].getAttribute("data-category");
                if (category === "all" || cardCategory === category) cards[i].style.display = "block";
                else cards[i].style.display = "none";
            }
        }

        function searchProduct() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toUpperCase();
            const cards = document.getElementsByClassName("product-card");
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getAttribute("data-title");
                if (title.toUpperCase().indexOf(filter) > -1) cards[i].style.display = "block";
                else cards[i].style.display = "none";
            }
        }
    </script>
</body>
</html>
